[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "vuoro-service"
version = "0.1.0"
description = "Modular service runtime for Vuoro governed-work adapters"
readme = "../../README.md"
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.115,<1",
  "jsonschema>=4.23,<5",
  "uvicorn[standard]>=0.34,<1",
]

[project.optional-dependencies]
test = [
  "httpx>=0.27,<1",
  "pytest>=8.3,<9",
]

[project.scripts]
vuoro-service = "vuoro_service.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/vuoro_service"]
