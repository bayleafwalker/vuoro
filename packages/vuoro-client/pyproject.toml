[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "vuoro-client"
version = "0.1.0.dev0"
description = "Transport-only client for Vuoro governed-work services"
readme = "../../README.md"
requires-python = ">=3.12"
dependencies = [
  "httpx>=0.27,<1",
  "jsonschema>=4.23,<5",
]

[project.optional-dependencies]
test = ["pytest>=8.3,<9"]

[project.scripts]
vuoro = "vuoro_client.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/vuoro_client"]
