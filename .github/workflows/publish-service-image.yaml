name: Publish Vuoro service image

on:
  push:
    tags:
      - "vuoro-service-v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/vuoro-service:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/vuoro-service:sha-${{ github.sha }}
